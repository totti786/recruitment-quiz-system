services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: recruitment-quiz-server:latest
    container_name: quiz-server
    env_file:
      - .env.deploy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:./prisma/prod.db
    volumes:
      - server-data:/app/prisma
      - server-uploads:/app/uploads
    restart: unless-stopped
    networks:
      - edge

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: recruitment-quiz-client:latest
    container_name: quiz-client
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quiz.rule=Host(`quiz.deshli.site`)"
      - "traefik.http.routers.quiz.entrypoints=websecure"
      - "traefik.http.routers.quiz.tls=true"
      - "traefik.http.routers.quiz.tls.certresolver=letsencrypt"
      - "traefik.http.services.quiz.loadbalancer.server.port=80"

volumes:
  server-data:
  server-uploads:

networks:
  edge:
    external: true
