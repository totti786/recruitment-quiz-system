name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: test-secret-key
          NODE_ENV: test
          DATABASE_URL: file:./test.db

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: ./server/coverage

  test-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage
          path: ./client/coverage

  build:
    runs-on: ubuntu-latest
    needs: [test-server, test-client]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: npm run install:all

      - name: Build client
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: ./client/dist

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-server, test-client]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose -f docker-compose.prod.yml build

      - name: Test Docker containers
        run: |
          mkdir -p /opt/recruitment-quiz
          cat > /opt/recruitment-quiz/server.env <<EOF
          DATABASE_URL=file:./dev.db
          JWT_SECRET=test-secret
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=admin123
          NODE_ENV=production
          PORT=3001
          EOF
          docker compose -f docker-compose.prod.yml up -d
          sleep 10
          docker compose -f docker-compose.prod.yml ps
          curl -f http://localhost:3001/api/health || exit 1
          docker compose -f docker-compose.prod.yml down

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to local registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login registry.nextrum-sy.com -u ci-user --password-stdin

      - name: Tag and push images
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker tag recruitment-quiz-server:latest registry.nextrum-sy.com/recruitment-quiz-server:$SHORT_SHA
          docker tag recruitment-quiz-server:latest registry.nextrum-sy.com/recruitment-quiz-server:latest
          docker tag recruitment-quiz-client:latest registry.nextrum-sy.com/recruitment-quiz-client:$SHORT_SHA
          docker tag recruitment-quiz-client:latest registry.nextrum-sy.com/recruitment-quiz-client:latest
          docker push registry.nextrum-sy.com/recruitment-quiz-server:$SHORT_SHA
          docker push registry.nextrum-sy.com/recruitment-quiz-server:latest
          docker push registry.nextrum-sy.com/recruitment-quiz-client:$SHORT_SHA
          docker push registry.nextrum-sy.com/recruitment-quiz-client:latest

      - name: Build webhook payload
        id: payload
        env:
          SECRET: ${{ secrets.PMCLUSTER_WEBHOOK_SECRET }}
        run: |
          MANIFEST=$(cat recruitment-quiz.pmcluster.yaml)
          BODY=$(echo "$MANIFEST" | jq -Rs '{manifest: .}')
          SIG=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print "sha256=" $2}')
          echo "body<<BODY_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "BODY_EOF" >> $GITHUB_OUTPUT
          echo "sig=$SIG" >> $GITHUB_OUTPUT

      - name: Trigger pmcluster deploy
        run: |
          curl -X POST https://pmcluster.nextrum-sy.com/webhook/quiz-github \
            -H "Content-Type: application/json" \
            -H "X-Pmcluster-Signature: ${{ steps.payload.outputs.sig }}" \
            -d '${{ steps.payload.outputs.body }}'
