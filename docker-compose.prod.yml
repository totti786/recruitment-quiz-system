services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quiz-server-prod
    ports:
      - "3001:3001"
    env_file:
      - /opt/recruitment-quiz/server.env
    environment:
      - NODE_ENV=production
    volumes:
      - server-data:/app/prisma
    restart: unless-stopped
    networks:
      - quiz-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: quiz-client-prod
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - quiz-network

volumes:
  server-data:

networks:
  quiz-network:
    driver: bridge
